version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medcore_postgres
    environment:
      POSTGRES_DB: medcore_db
      POSTGRES_USER: medcore_admin
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medcore_network

  redis:
    image: redis:7-alpine
    container_name: medcore_redis
    ports:
      - "6379:6379"
    networks:
      - medcore_network

networks:
  medcore_network:
    driver: bridge

volumes:
  postgres_data: